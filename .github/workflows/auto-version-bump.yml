name: Auto Version Bump

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  actions: write
  statuses: write

jobs:
  bump-version:
    name: Create Version Bump PR
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref != 'chore/auto-version-bump' &&
      !startsWith(github.event.pull_request.head.ref, 'chore/version-bump-')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_PR: ${{ github.event.pull_request.number }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          BRANCH="chore/version-bump-${SOURCE_PR}-to-${VERSION}"

          git switch -c "$BRANCH"
          git add package.json package-lock.json
          git commit -m "chore: バージョンを${VERSION}に更新"
          git push -u origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "バージョンを${VERSION}に更新" \
            --body "PR #${SOURCE_PR} の main マージに伴う自動 patch version 更新です。"

          SHA="$(git rev-parse HEAD)"

          gh workflow run ci.yml --ref "$BRANCH" --field ref="$BRANCH"

          sleep 10
          RUN_ID=""
          for i in $(seq 1 30); do
            RUN_ID="$(gh run list \
              --workflow ci.yml \
              --branch "$BRANCH" \
              --event workflow_dispatch \
              --limit 1 \
              --json databaseId,headSha \
              --jq ".[] | select(.headSha == \"$SHA\") | .databaseId" 2>/dev/null || true)"
            if [ -n "$RUN_ID" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "$RUN_ID" ]; then
            echo "CI run not found for SHA $SHA" >&2
            exit 1
          fi

          RUN_URL="$(gh run list \
            --workflow ci.yml \
            --branch "$BRANCH" \
            --event workflow_dispatch \
            --limit 1 \
            --json databaseId,url \
            --jq ".[] | select(.databaseId == $RUN_ID) | .url")"

          if gh run watch "$RUN_ID" --exit-status; then
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" \
              -f state=success \
              -f context="Build and Test" \
              -f description="CI workflow_dispatch passed" \
              -f target_url="$RUN_URL"
          else
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" \
              -f state=failure \
              -f context="Build and Test" \
              -f description="CI workflow_dispatch failed" \
              -f target_url="$RUN_URL"
            exit 1
          fi
